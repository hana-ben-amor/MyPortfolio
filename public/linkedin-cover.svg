<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" width="1584" height="396">
  <defs>
    <!-- Dark background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1584" y2="396" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#0a0a0a"/>
      <stop offset="50%"  stop-color="#111111"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>

    <!-- Subtle dark glow left -->
    <radialGradient id="glow1" cx="20%" cy="50%" r="40%">
      <stop offset="0%"   stop-color="#1a1a2e" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
    </radialGradient>

    <!-- Subtle dark glow right -->
    <radialGradient id="glow2" cx="82%" cy="55%" r="35%">
      <stop offset="0%"   stop-color="#161625" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
    </radialGradient>

    <!-- Name gradient — light silver/white -->
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="50%"  stop-color="#e5e5e5"/>
      <stop offset="100%" stop-color="#c0c0c0"/>
    </linearGradient>

    <!-- Accent line gradient — silver -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#aaaaaa" stop-opacity="1"/>
      <stop offset="70%"  stop-color="#888888" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Gold accent for AWS -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#d4a017"/>
      <stop offset="100%" stop-color="#f0c040"/>
    </linearGradient>

    <clipPath id="bounds">
      <rect width="1584" height="396"/>
    </clipPath>
  </defs>

  <g clip-path="url(#bounds)">
    <!-- Background -->
    <rect width="1584" height="396" fill="url(#bg)"/>
    <rect width="1584" height="396" fill="url(#glow1)"/>
    <rect width="1584" height="396" fill="url(#glow2)"/>

    <!-- Subtle grid lines -->
    <line x1="0" y1="66"  x2="1584" y2="66"  stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
    <line x1="0" y1="132" x2="1584" y2="132" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
    <line x1="0" y1="198" x2="1584" y2="198" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
    <line x1="0" y1="264" x2="1584" y2="264" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
