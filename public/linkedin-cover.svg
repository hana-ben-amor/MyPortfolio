    <rect x="1212" y="192" width="56" height="30" rx="15" fill="#161616" stroke="#222" stroke-width="1"/>
    <text x="1240" y="212" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#777777">SQL</text>

