<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="letter" x1="0" y1="14" x2="64" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e9d5ff"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="16" fill="url(#bg)"/>
  <!-- Subtle inner glow ring -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <!-- "H" letter -->
  <text x="50%" y="50%" dominant-baseline="central" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="38" font-weight="700" fill="url(#letter)">H</text>
  <!-- Small dot accent bottom-right -->
  <circle cx="46" cy="46" r="4" fill="#c084fc" opacity="0.8"/>
</svg>
